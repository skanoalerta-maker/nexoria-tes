<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Nébula | Novela</title>
  <meta
    name="description"
    content="Explora capítulos, desbloquea historias y sigue leyendo en Nébula."
  />
  <meta name="theme-color" content="#07101f" />

  <style>
    :root{
      --bg:#040816;
      --bg2:#07101f;
      --bg3:#0b1730;
      --panel:rgba(8,18,40,.78);
      --panel-strong:rgba(10,20,44,.92);
      --panel-soft:rgba(14,24,48,.62);
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(89,149,255,.22);
      --text:#f8fbff;
      --muted:#b8c4da;
      --muted-2:#8ea3c8;
      --blue:#3490ff;
      --blue2:#66b8ff;
      --violet:#9a66ff;
      --cyan:#50dbff;
      --gold:#ffd54a;
      --gold-2:#ffbf1f;
      --green:#4ee7a8;
      --shadow:0 24px 70px rgba(0,0,0,.34);
      --shadow-soft:0 18px 46px rgba(0,0,0,.24);
      --radius:26px;
      --radius-lg:32px;
      --container:min(1180px, calc(100% - 32px));
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 14%, rgba(76,109,255,.16), transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(166,90,255,.16), transparent 28%),
        radial-gradient(circle at 26% 76%, rgba(67,201,255,.10), transparent 24%),
        linear-gradient(180deg, #040816 0%, #07101f 42%, #09162e 100%);
      overflow-x:hidden;
      position:relative;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font:inherit;
    }

    img{
      display:block;
      max-width:100%;
    }

    .container{
      width:var(--container);
      margin:0 auto;
      position:relative;
      z-index:2;
    }

    #stars-canvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:-35;
      pointer-events:none;
    }

    .galaxy-bg,
    .galaxy-bg::before,
    .galaxy-bg::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      display:block;
    }

    .galaxy-bg{
      z-index:-30;
      overflow:hidden;
    }

    .galaxy-bg::before{
      background-image:
        radial-gradient(2px 2px at 8% 11%, rgba(255,255,255,.94), transparent 62%),
        radial-gradient(1.5px 1.5px at 18% 67%, rgba(255,255,255,.88), transparent 62%),
        radial-gradient(2px 2px at 27% 37%, rgba(255,255,255,.86), transparent 62%),
        radial-gradient(1px 1px at 35% 82%, rgba(255,255,255,.72), transparent 62%),
        radial-gradient(2px 2px at 46% 18%, rgba(255,255,255,.88), transparent 62%),
        radial-gradient(1.5px 1.5px at 56% 56%, rgba(255,255,255,.74), transparent 62%),
        radial-gradient(2px 2px at 66% 26%, rgba(255,255,255,.90), transparent 62%),
        radial-gradient(1px 1px at 76% 74%, rgba(255,255,255,.70), transparent 62%),
        radial-gradient(2px 2px at 85% 45%, rgba(255,255,255,.86), transparent 62%),
        radial-gradient(1.5px 1.5px at 94% 14%, rgba(255,255,255,.82), transparent 62%);
      opacity:.7;
      animation: starsFloat 120s linear infinite;
    }

    .galaxy-bg::after{
      background:
        radial-gradient(circle at 18% 22%, rgba(75,122,255,.12), transparent 20%),
        radial-gradient(circle at 78% 22%, rgba(174,84,255,.12), transparent 22%),
        radial-gradient(circle at 68% 70%, rgba(58,194,255,.10), transparent 25%),
        radial-gradient(circle at 30% 82%, rgba(124,255,220,.07), transparent 18%);
      filter:blur(38px);
      opacity:.95;
      animation: nebulaDrift 22s ease-in-out infinite alternate;
    }

    .galaxy-layer{
      position:fixed;
      inset:0;
      z-index:-29;
      pointer-events:none;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.42), transparent 62%),
        radial-gradient(1px 1px at 22% 40%, rgba(255,255,255,.34), transparent 62%),
        radial-gradient(1px 1px at 34% 70%, rgba(255,255,255,.42), transparent 62%),
        radial-gradient(1px 1px at 48% 30%, rgba(255,255,255,.34), transparent 62%),
        radial-gradient(1px 1px at 59% 60%, rgba(255,255,255,.38), transparent 62%),
        radial-gradient(1px 1px at 72% 16%, rgba(255,255,255,.44), transparent 62%),
        radial-gradient(1px 1px at 82% 48%, rgba(255,255,255,.32), transparent 62%),
        radial-gradient(1px 1px at 92% 78%, rgba(255,255,255,.35), transparent 62%);
      opacity:.55;
      animation: starsFloatReverse 180s linear infinite;
    }

    .bg-grid{
      position:fixed;
      inset:0;
      z-index:-28;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size:64px 64px;
      mask-image:radial-gradient(circle at center, rgba(0,0,0,.95), transparent 88%);
      opacity:.26;
    }

    .bg-orb{
      position:fixed;
      pointer-events:none;
      border-radius:50%;
      filter:blur(48px);
      z-index:-27;
      opacity:.36;
    }

    .orb-1{
      width:420px;
      height:420px;
      top:14%;
      right:-120px;
      background:radial-gradient(circle, rgba(123,78,255,.36), transparent 68%);
      animation: orbMove1 18s ease-in-out infinite alternate;
    }

    .orb-2{
      width:360px;
      height:360px;
      left:-120px;
      top:34%;
      background:radial-gradient(circle, rgba(61,173,255,.28), transparent 68%);
      animation: orbMove2 20s ease-in-out infinite alternate;
    }

    @keyframes starsFloat{
      from{ transform:translateY(0); }
      to{ transform:translateY(-120px); }
    }

    @keyframes starsFloatReverse{
      from{ transform:translateY(0); }
      to{ transform:translateY(85px); }
    }

    @keyframes nebulaDrift{
      0%{ transform:scale(1) translate3d(0,0,0); }
      100%{ transform:scale(1.07) translate3d(-1.5%, 1.5%, 0); }
    }

    @keyframes orbMove1{
      from{ transform:translate3d(0,0,0); }
      to{ transform:translate3d(-30px, 35px, 0); }
    }

    @keyframes orbMove2{
      from{ transform:translate3d(0,0,0); }
      to{ transform:translate3d(35px, -22px, 0); }
    }

    .page-header{
      padding:16px 0 14px;
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(16px);
      background:linear-gradient(180deg, rgba(4,10,24,.90), rgba(4,10,24,.64));
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .page-header-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      flex-wrap:wrap;
    }

    .brand-wrap{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .brand-link{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brand-logo{
      width:142px;
      height:auto;
      object-fit:contain;
      flex-shrink:0;
      filter:
        drop-shadow(0 0 18px rgba(118,160,255,.26))
        drop-shadow(0 0 34px rgba(62,123,255,.20));
    }

    .brand-copy{
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .brand-copy strong{
      font-size:.74rem;
      line-height:1;
      letter-spacing:.14em;
      white-space:nowrap;
      opacity:.96;
    }

    .brand-copy span{
      color:var(--muted);
      font-size:.46rem;
      margin-top:4px;
      letter-spacing:.04em;
      white-space:nowrap;
    }

    .header-actions{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:10px;
      min-height:48px;
      padding:0 18px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-weight:700;
    }

    .mini-badge{
      display:inline-flex;
      align-items:center;
      min-height:36px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#dce8ff;
      font-size:.88rem;
      font-weight:700;
    }

    .user-chip{
      display:inline-flex;
      align-items:center;
      min-height:44px;
      padding:0 16px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#edf4ff;
      font-size:.92rem;
      font-weight:800;
    }

    .hero{
      padding:32px 0 22px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:minmax(330px, 420px) minmax(0, 1fr);
      gap:26px;
      align-items:stretch;
    }

    .hero-cover-card,
    .hero-content{
      border-radius:30px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(8,18,40,.86), rgba(8,18,40,.62));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow);
    }

    .hero-cover-wrap{
      width:100%;
      aspect-ratio:4 / 5.1;
      background:#050b1a;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .hero-cover{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center;
      background:#050b1a;
    }

    .hero-content{
      padding:28px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .story-tags{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .story-tags span{
      display:inline-flex;
      align-items:center;
      min-height:36px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-weight:700;
      color:#eff6ff;
    }

    .hero-content h1{
      font-size:clamp(2rem, 4vw, 3.5rem);
      line-height:.95;
      letter-spacing:-.04em;
    }

    .story-description{
      color:var(--muted);
      line-height:1.8;
      font-size:1.05rem;
      max-width:70ch;
    }

    .hero-meta{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:14px;
    }

    .meta-card{
      padding:16px 16px 14px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }

    .meta-card small{
      display:block;
      color:var(--muted-2);
      font-size:.82rem;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .meta-card strong{
      display:block;
      font-size:1rem;
      line-height:1.3;
    }

    .value-strip{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:14px;
      margin-top:2px;
    }

    .value-card{
      padding:16px 16px 14px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.07);
    }

    .value-card small{
      display:block;
      color:var(--muted-2);
      font-size:.8rem;
      margin-bottom:7px;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .value-card strong{
      display:block;
      font-size:1rem;
      line-height:1.35;
      color:#fff;
    }

    .weekly-banner{
      position:relative;
      overflow:hidden;
      padding:22px 22px 20px;
      border-radius:24px;
      background:
        radial-gradient(circle at 12% 20%, rgba(82,140,255,.16), transparent 30%),
        radial-gradient(circle at 86% 20%, rgba(154,102,255,.16), transparent 34%),
        linear-gradient(135deg, rgba(12,22,52,.96), rgba(8,16,38,.94));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow-soft);
    }

    .weekly-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .weekly-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#eaf3ff;
      font-weight:800;
      font-size:.84rem;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .weekly-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 16px rgba(78,231,168,.72);
      animation:pulseDot 1.7s ease-in-out infinite;
      flex-shrink:0;
    }

    @keyframes pulseDot{
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(1.35); opacity:.7; }
    }

    .weekly-banner h3{
      font-size:1.28rem;
      line-height:1.1;
      margin-bottom:8px;
    }

    .weekly-banner p{
      color:#d7e5fb;
      line-height:1.72;
      font-size:.98rem;
    }

    .access-banner{
      padding:16px 18px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .access-banner strong{
      display:block;
      margin-bottom:6px;
      font-size:1rem;
    }

    .access-banner span{
      display:block;
      color:var(--muted);
      line-height:1.65;
      font-size:.95rem;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:auto;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:54px;
      padding:0 22px;
      border-radius:18px;
      border:1px solid transparent;
      font-weight:800;
      font-size:1rem;
      cursor:pointer;
      transition:transform .2s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
      white-space:nowrap;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      color:#fff;
      background:linear-gradient(135deg, #2a82ff 0%, #4aa7ff 100%);
      box-shadow:0 18px 34px rgba(38,121,255,.24);
    }

    .btn-secondary{
      color:#fff;
      background:rgba(255,255,255,.06);
      border-color:rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
    }

    .payment-buttons{
      display:flex;
      flex-direction:column;
      gap:12px;
      min-width:min(100%, 320px);
    }

    .btn-gold{
      color:#171105;
      background:linear-gradient(135deg, #ffec9e 0%, #ffd54a 38%, #ffbf1f 100%);
      border:1px solid rgba(255,212,74,.48);
      box-shadow:0 18px 34px rgba(255,191,31,.20), 0 0 0 1px rgba(255,255,255,.14) inset;
      text-shadow:0 1px 0 rgba(255,255,255,.28);
      font-weight:900;
    }

    .btn-gold:hover{
      transform:translateY(-1px);
      box-shadow:0 22px 40px rgba(255,191,31,.28), 0 0 0 1px rgba(255,255,255,.18) inset;
    }

    .mini-badge.gold{
      background:linear-gradient(135deg, rgba(255,212,74,.18), rgba(255,191,31,.12));
      border:1px solid rgba(255,212,74,.34);
      color:#fff6cf;
    }

    .chapters-section{
      padding:10px 0 60px;
    }

    .section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .section-head h2{
      font-size:clamp(1.5rem, 3vw, 2.6rem);
      line-height:1;
    }

    .section-note{
      color:var(--muted);
      max-width:560px;
      line-height:1.7;
    }

    .chapters-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:18px;
    }

    .chapter-card{
      position:relative;
      display:flex;
      flex-direction:column;
      gap:14px;
      padding:22px;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(8,18,40,.88), rgba(8,18,40,.68));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow-soft);
      transition:transform .2s ease, border-color .2s ease, background .2s ease;
      overflow:hidden;
    }

    .chapter-card:hover{
      transform:translateY(-2px);
      border-color:rgba(90,160,255,.24);
    }

    .chapter-card-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .chapter-number{
      display:inline-flex;
      align-items:center;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#dbe9ff;
      font-weight:800;
      font-size:.88rem;
    }

    .chapter-status{
      display:inline-flex;
      align-items:center;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      font-weight:800;
      font-size:.84rem;
      letter-spacing:.03em;
      border:1px solid rgba(255,255,255,.08);
    }

    .status-free{
      background:rgba(49,166,105,.14);
      color:#b5ffd1;
    }

    .status-premium{
      background:rgba(69,126,255,.14);
      color:#d8e7ff;
    }

    .status-locked{
      background:rgba(255,255,255,.08);
      color:#f3f7ff;
    }

    .chapter-card h3{
      font-size:1.38rem;
      line-height:1.08;
      letter-spacing:-.02em;
    }

    .chapter-card p{
      color:var(--muted);
      line-height:1.72;
      font-size:.98rem;
      flex:1;
    }

    .chapter-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:auto;
    }

    .chapter-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 18px;
      border-radius:16px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.09);
      transition:transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .chapter-link:hover{
      transform:translateY(-1px);
    }

    .chapter-link.primary{
      color:#fff;
      background:linear-gradient(135deg, #2a82ff 0%, #4aa7ff 100%);
      border-color:transparent;
    }

    .chapter-link.secondary{
      color:#fff;
      background:rgba(255,255,255,.05);
    }

    .chapter-card.locked{
      overflow:hidden;
    }

    .chapter-card.locked .chapter-lock-target{
      filter:blur(4px);
      opacity:.48;
      user-select:none;
      pointer-events:none;
    }

    .chapter-card.locked::after{
      content:"🔒 Contenido premium";
      position:absolute;
      right:18px;
      bottom:18px;
      display:inline-flex;
      align-items:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(10,16,28,.82);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-weight:800;
      font-size:.86rem;
      backdrop-filter:blur(10px);
      z-index:2;
    }

    .premium-box{
      margin-top:26px;
      padding:24px;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(8,18,40,.92), rgba(8,18,40,.72));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      flex-wrap:wrap;
    }

    .premium-box h3{
      font-size:1.35rem;
      margin-bottom:8px;
    }

    .premium-box p{
      color:var(--muted);
      line-height:1.7;
      max-width:720px;
    }

    .premium-details{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .premium-pill{
      display:inline-flex;
      align-items:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-weight:800;
      font-size:.9rem;
    }

    .premium-note{
      margin-top:16px;
      padding:18px;
      border-radius:22px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
    }

    .premium-note strong{
      display:block;
      margin-bottom:6px;
      font-size:1rem;
    }

    .premium-note span{
      display:block;
      color:var(--muted);
      line-height:1.7;
      font-size:.96rem;
    }

    .error-box{
      width:var(--container);
      margin:48px auto;
      padding:28px;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(8,18,40,.92), rgba(8,18,40,.72));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow);
      position:relative;
      z-index:2;
    }

    .error-box h1{

  function escapeHtml(text) {
    return String(text ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function getSeasonOrderValue(season) {
    const match = String(season || "").match(/\d+/);
    return match ? Number(match[0]) : 999;
  }

  function getOrderedChapters(chapters) {
    return [...(Array.isArray(chapters) ? chapters : [])].sort((a, b) => {
      const seasonDiff = getSeasonOrderValue(a.season) - getSeasonOrderValue(b.season);
      if (seasonDiff !== 0) return seasonDiff;
      return Number(a.num || 0) - Number(b.num || 0);
    });
  }

        plan: "free",
        subscription: "free",
        coins: 0,
        unlockedNovels: []
      };

    try {
      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);

      if (!snap.exists()) {
        return {
          isLogged: true,
          isPremium: false,
          plan: "free",
          subscription: "free",
          coins: 0,
          unlockedNovels: []
        };
      }

      const data = snap.data();
      const plan = String(data.plan || "free").toLowerCase();
      const subscription = String(data.subscription || plan || "free").toLowerCase();
      const isPremium = plan === "premium" || subscription === "premium";

      return {
        isLogged: true,
        isPremium,
        plan,
        subscription,
        coins: Number(data.coins || 0),
        unlockedNovels: Array.isArray(data.unlockedNovels) ? data.unlockedNovels : []
      };
    } catch (error) {
      console.error("Error leyendo acceso del usuario:", error);
      return {

        isPremium: false,
        plan: "free",
        subscription: "free",

  async function postJson(url, payload) {
    const response = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const rawText = await response.text();

    let data;
    try {
      data = JSON.parse(rawText);
    } catch (error) {
      console.error("Respuesta no válida del servidor:", rawText);
      throw new Error("El servidor no devolvió JSON válido. Revisa la URL del backend o el endpoint.");
    }

    if (!response.ok) {
      throw new Error(data.error || data.message || "Error del servidor.");
    }

    return data;
  }

  async function useCoinForNovel(currentUser, currentNovelId) {
  const userRef = doc(db, "users", currentUser.uid);

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(userRef);

    if (!snap.exists()) {
      throw new Error("No se encontró tu cuenta de usuario.");
    }

    const data = snap.data() || {};
    const coins = Number(data.coins || 0);
    const unlockedNovels = Array.isArray(data.unlockedNovels)
      ? data.unlockedNovels
      : [];

    // 🔥 CONVERTIR A ID BASE (SIN TEMPORADA)
    // codigo-nebula-t1 → codigo-nebula
    const unlockId = currentNovelId.replace(/-t\d+$/, "");

    // 🚫 SI YA ESTÁ DESBLOQUEADA LA NOVELA, NO HACER NADA
    if (unlockedNovels.includes(unlockId)) {
      return;
    }

    // 🚫 SI NO TIENE COINS
    if (coins <= 0) {
      throw new Error("No tienes coins disponibles.");
    }

    // 💰 DESCONTAR COIN + GUARDAR NOVELA DESBLOQUEADA
    transaction.update(userRef, {
      coins: coins - 1,
      unlockedNovels: [...unlockedNovels, unlockId],
      updatedAt: serverTimestamp()
    });
  });
}

      star.classList.toggle("active", starValue <= value);

  async function loadRatingData(novelId, user) {
    const ratingRef = doc(db, "ratings", novelId);
    const ratingSnap = await getDoc(ratingRef);

    let totalVotes = 0;
    let totalScore = 0;
    let average = 0;

    if (ratingSnap.exists()) {
      const data = ratingSnap.data();
      totalVotes = Number(data.totalVotes || 0);
      totalScore = Number(data.totalScore || 0);
      average = Number(data.average || 0);
    }

    let userVote = 0;

    if (user) {
      const voteRef = doc(db, "ratings", novelId, "votes", user.uid);
      const voteSnap = await getDoc(voteRef);

      if (voteSnap.exists()) {
        userVote = Number(voteSnap.data().value || 0);
      }
    }

    return {
      totalVotes,
      totalScore,
      average,
      userVote
    };
  }

  function renderRatingUI(ratingState, stars, averageEl, totalEl, statusEl) {
    const totalVotes = Number(ratingState.totalVotes || 0);
    const average = Number(ratingState.average || 0);
    const userVote = Number(ratingState.userVote || 0);

    averageEl.textContent = totalVotes > 0 ? average.toFixed(1) : "0.0";
    totalEl.textContent = String(totalVotes);

    if (userVote > 0) {
      statusEl.textContent = `Tu valoración actual es de ${userVote} estrella${userVote === 1 ? "" : "s"}.`;
      paintStars(stars, userVote);
      return;
    }

    if (totalVotes > 0) {
      statusEl.textContent = "Valora esta novela para ayudar a otros lectores.";
      paintStars(stars, Math.round(average));
      return;
    }

    statusEl.textContent = "Sé el primero en valorar esta novela.";

  async function submitVote(novelId, user, value) {
    if (!user) {
      throw new Error("Debes iniciar sesión para votar.");
    }

    const ratingRef = doc(db, "ratings", novelId);
    const voteRef = doc(db, "ratings", novelId, "votes", user.uid);

    await runTransaction(db, async (transaction) => {
      const ratingSnap = await transaction.get(ratingRef);
      const voteSnap = await transaction.get(voteRef);

      let totalVotes = 0;
      let totalScore = 0;

      if (ratingSnap.exists()) {
        const data = ratingSnap.data();
        totalVotes = Number(data.totalVotes || 0);
        totalScore = Number(data.totalScore || 0);
      }

      let previousVote = 0;
      let createdAtValue = serverTimestamp();

      if (voteSnap.exists()) {
        previousVote = Number(voteSnap.data().value || 0);
        createdAtValue = voteSnap.data().createdAt || serverTimestamp();
      }

      if (previousVote > 0) {
        totalScore = totalScore - previousVote + value;
      } else {
        totalVotes += 1;
        totalScore += value;
      }

      const average = totalVotes > 0 ? totalScore / totalVotes : 0;

      transaction.set(
        ratingRef,
        {
          novelId,
          totalVotes,
          totalScore,
          average,
          updatedAt: serverTimestamp()
        },
        { merge: true }
      );

      transaction.set(
        voteRef,
        {
          uid: user.uid,
          value,
          createdAt: createdAtValue,
          updatedAt: serverTimestamp()
        },
        { merge: true }
      );
    });
  }

  <script>
    const canvas = document.getElementById("stars-canvas");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function resizeStarsCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      createStars();
    }

    function createStars() {
      stars = [];
      const area = window.innerWidth * window.innerHeight;
      const amount = Math.max(70, Math.floor(area / 14000));

      for (let i = 0; i < amount; i++) {
        stars.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.5 + 0.4,
          speed: Math.random() * 0.25 + 0.05,
          alpha: Math.random() * 0.7 + 0.15
        });
      }
    }

    function animateStars() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (const s of stars) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();

        s.y += s.speed;

        if (s.y > window.innerHeight + 2) {
          s.y = -2;
          s.x = Math.random() * window.innerWidth;
        }
      }

      requestAnimationFrame(animateStars);
    }

    window.addEventListener("resize", resizeStarsCanvas);
    resizeStarsCanvas();
    animateStars();
  </script>
